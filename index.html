<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Hockey Â· Club San Fernando</title>
<meta name="theme-color" content="#0d1f12"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Hockey CSF"/>
<link rel="apple-touch-icon" href="https://clubsanfernando.org.ar/wp-content/uploads/2026/01/cropped-escudo-csf-300x300.png"/>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#00873f;--g2:#005c2b;
  --b:#1a4fd6;--b2:#0f35a0;
  --bg:#f1f5f9;--card:#fff;
  --tx:#0f172a;--sub:#64748b;--muted:#94a3b8;
  --brd:#e2e8f0;
  --nav-h:64px;
  --r:14px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--tx);
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* ââ LOADER ââ */
#loader{
  position:fixed;inset:0;
  background:#0d1f12;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;color:#fff;gap:18px;
}
.spin{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,.15);
  border-top-color:#4ade80;
  border-radius:50%;
  animation:rot .7s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}
#loader p{font-size:.9rem;color:rgba(255,255,255,.5);letter-spacing:.3px}
#loader.off{display:none}

/* ââ HEADER ââ */
header{
  background:linear-gradient(150deg,#0d2818 0%,#091535 100%);
  flex-shrink:0;
}
.htop{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px 10px;
}
.logo{
  width:42px;height:42px;border-radius:50%;
  border:2px solid rgba(255,255,255,.2);
  background:#fff;padding:2px;
  flex-shrink:0;object-fit:cover;
}
.hinfo h1{font-size:1rem;font-weight:700;color:#fff;line-height:1.2}
.hinfo p{font-size:.65rem;color:rgba(255,255,255,.45);margin-top:2px}
.hts{
  margin-left:auto;
  font-size:.6rem;color:rgba(255,255,255,.3);
  text-align:right;line-height:1.6;
}
.tri{height:3px;background:linear-gradient(90deg,var(--g) 33.3%,#fff 33.3% 66.6%,var(--b) 66.6%)}

/* ââ SCROLL AREA ââ */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* ââ BOTTOM NAV ââ */
#bnav{
  height:var(--nav-h);
  background:#fff;
  border-top:1.5px solid var(--brd);
  display:flex;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nb{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;
  padding:6px 4px;position:relative;
  transition:color .15s;
  color:var(--muted);
}
.nb .ic{font-size:1.35rem;line-height:1;transition:transform .2s}
.nb .lb{font-size:.62rem;font-weight:600;letter-spacing:.2px;transition:color .15s}
/* active indicator bar at top */
.nb::before{
  content:'';position:absolute;top:0;left:20%;right:20%;
  height:2.5px;border-radius:0 0 3px 3px;
  background:transparent;transition:background .2s;
}
.nb.on{color:var(--g)}
.nb.on::before{background:var(--g)}
.nb.on .ic{transform:scale(1.15)}
.nb.on-b{color:var(--b)}
.nb.on-b::before{background:var(--b)}
.nb.on-b .ic{transform:scale(1.15)}

/* ââ SCREENS ââ */
.scr{display:none;padding:16px 14px 24px}
.scr.vis{display:block}

/* ââ CATEGORY CHIPS ââ */
.chips-wrap{
  margin:-16px -14px 16px;
  padding:10px 14px;
  background:#fff;
  border-bottom:1px solid var(--brd);
  overflow-x:auto;scrollbar-width:none;
  display:flex;align-items:center;gap:6px;
  position:sticky;top:0;z-index:10;
  box-shadow:0 1px 8px rgba(0,0,0,.06);
}
.chips-wrap::-webkit-scrollbar{display:none}
.cdiv{width:1px;min-height:22px;background:var(--brd);flex-shrink:0;margin:0 3px}
.chip{
  display:inline-flex;align-items:center;
  padding:7px 14px;border-radius:22px;
  font-size:.78rem;font-weight:700;
  border:1.5px solid var(--brd);
  background:#fff;color:var(--sub);
  cursor:pointer;transition:all .15s;flex-shrink:0;
  white-space:nowrap;
}
.chip.sc{background:var(--g);border-color:var(--g);color:#fff}
.chip.sd{background:var(--b);border-color:var(--b);color:#fff}

/* ââ SECTION LABEL ââ */
.slbl{
  font-size:.65rem;font-weight:800;color:var(--muted);
  letter-spacing:.8px;text-transform:uppercase;
  padding:14px 0 8px;
  display:flex;align-items:center;gap:8px;
}
.slbl::after{content:'';flex:1;height:1px;background:var(--brd)}

/* ââ UPDATE PILL ââ */
.upd-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:#fff;border:1px solid var(--brd);border-radius:20px;
  padding:6px 12px;font-size:.7rem;color:var(--sub);
  margin-bottom:14px;
}
.udot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* ââ HOY CARD ââ */
.hoy-card{
  background:linear-gradient(135deg,var(--g) 0%,var(--g2) 100%);
  border-radius:var(--r);padding:14px 16px 12px;margin-bottom:16px;
  box-shadow:0 4px 20px rgba(0,135,63,.25);
}
.hoy-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.hoy-head h2{font-size:.95rem;font-weight:700;color:#fff}
.hoy-badge{
  background:rgba(255,255,255,.25);color:#fff;
  font-size:.65rem;font-weight:700;
  padding:3px 9px;border-radius:12px;
}
/* horizontal match row inside hoy */
.hoy-item{
  background:rgba(255,255,255,.13);border-radius:10px;
  padding:10px 12px;margin-bottom:6px;
}
.hoy-item:last-child{margin-bottom:0}
.hoy-cat{
  font-size:.6rem;font-weight:700;
  color:rgba(255,255,255,.5);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;
}
.hoy-match{display:flex;align-items:center;gap:8px}
.hoy-t{flex:1;font-size:.82rem;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hoy-t.r{text-align:right}
.hoy-sc{
  background:rgba(255,255,255,.22);color:#fff;
  padding:4px 10px;border-radius:7px;
  font-weight:800;font-size:.85rem;
  min-width:48px;text-align:center;flex-shrink:0;
}
.hoy-sc.prox{font-size:.72rem;font-weight:500;background:rgba(255,255,255,.1)}

/* ââ ULTIMA FECHA CARDS ââ */
.uf-card{
  background:#fff;border-radius:var(--r);
  border:1px solid var(--brd);
  margin-bottom:10px;overflow:hidden;
}
.uf-head{
  background:#1e293b;padding:9px 14px;
  display:flex;justify-content:space-between;align-items:center;
}
.uf-cat{font-size:.72rem;font-weight:700;color:#fff}
.uf-fech{font-size:.62rem;color:rgba(255,255,255,.38)}
/* horizontal match in uf-card */
.uf-match{
  display:flex;align-items:center;padding:11px 14px;gap:8px;
  border-bottom:1px solid var(--brd);
}
.uf-match:last-child{border-bottom:none}
.uf-t{
  flex:1;font-size:.82rem;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.uf-t.r{text-align:right}
.uf-t.sf{color:var(--g);font-weight:700}
.uf-t.sfb{color:var(--b);font-weight:700}
.uf-sc{
  background:#1e293b;color:#fff;
  padding:4px 10px;border-radius:7px;
  font-weight:800;font-size:.82rem;
  min-width:42px;text-align:center;flex-shrink:0;
}

/* ââ FIXTURE ââ */
.rnd-lbl{
  font-size:.62rem;font-weight:800;
  color:rgba(255,255,255,.7);
  background:#1e293b;
  padding:5px 12px;margin-bottom:5px;
  border-radius:7px;
  letter-spacing:.5px;text-transform:uppercase;
  display:inline-block;
}

/* horizontal match card */
.m-card{
  background:#fff;border-radius:12px;
  border:1px solid var(--brd);
  padding:12px 14px;margin-bottom:7px;
}
.m-teams{
  display:flex;align-items:center;gap:10px;
}
.m-t{
  flex:1;font-size:.85rem;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.3;
}
.m-t.r{text-align:right}
.m-t.sf{color:var(--g);font-weight:700}
.m-t.sfb{color:var(--b);font-weight:700}
.m-sc{
  background:#1e293b;color:#fff;
  padding:6px 12px;border-radius:9px;
  font-weight:800;font-size:.95rem;
  min-width:54px;text-align:center;
  flex-shrink:0;letter-spacing:1px;
}
.m-sc.prox{
  background:var(--bg);color:var(--sub);
  font-size:.78rem;font-weight:600;letter-spacing:0;
}
.m-fecha{
  font-size:.62rem;color:var(--muted);
  text-align:center;margin-top:6px;
}

/* ââ TABLES ââ */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--brd);background:#fff}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead th{
  background:#1e293b;color:#fff;
  padding:10px 8px;text-align:center;
  font-size:.65rem;letter-spacing:.4px;white-space:nowrap;
}
thead th:first-child{text-align:left;padding-left:14px;min-width:110px}
tbody tr:nth-child(even){background:#f8fafc}
tbody td{padding:9px 8px;border-bottom:1px solid var(--brd);text-align:center;font-size:.78rem}
tbody td:first-child{text-align:left;padding-left:14px;font-weight:600}
tbody tr:last-child td{border-bottom:none}
.hl{background:#dcfce7!important;border-left:3px solid var(--g)}
.hlb{background:#dbeafe!important;border-left:3px solid var(--b)}
.nd{text-align:center;color:var(--sub);padding:44px 20px;font-size:.85rem}

/* ââ DESKTOP FALLBACK ââ */
@media(min-width:700px){
  html,body{overflow:auto;height:auto}
  #content{overflow:visible}
  #bnav{position:fixed;bottom:0;left:0;right:0}
  body{padding-bottom:var(--nav-h)}
  .scr{max-width:700px;margin:0 auto}
}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><p>Cargando datos...</p></div>

<header>
  <div class="htop">
    <img class="logo" src="https://clubsanfernando.org.ar/wp-content/uploads/2026/01/cropped-escudo-csf-300x300.png" alt="CSF" style="display:none" onload="this.style.display=''"/>
    <div class="hinfo"><h1>Hockey CSF</h1><p>Torneo Metropolitano AHBA</p></div>
    <div class="hts" id="hts"></div>
  </div>
  <div class="tri"></div>
</header>

<div id="content">
  <!-- INICIO -->
  <div class="scr vis" id="sc-inicio">
    <div class="upd-pill"><div class="udot"></div><span id="updMsg">Cargando...</span></div>
    <div id="hoyWrap"></div>
    <div class="slbl">Ãltima Fecha</div>
    <div id="ufGrid"></div>
  </div>

  <!-- FIXTURE -->
  <div class="scr" id="sc-fixture">
    <div class="chips-wrap" id="ch-fixture"></div>
    <div id="fix-content"></div>
  </div>

  <!-- POSICIONES -->
  <div class="scr" id="sc-pos">
    <div class="chips-wrap" id="ch-pos"></div>
    <div id="pos-content"></div>
  </div>

  <!-- GOLEADORES -->
  <div class="scr" id="sc-gol">
    <div class="chips-wrap" id="ch-gol"></div>
    <div id="gol-content"></div>
  </div>
</div>

<nav id="bnav">
  <button class="nb on" id="nb-inicio" onclick="goTo('inicio')">
    <span class="ic">ð </span><span class="lb">Inicio</span>
  </button>
  <button class="nb" id="nb-fixture" onclick="goTo('fixture')">
    <span class="ic">ð</span><span class="lb">Fixture</span>
  </button>
  <button class="nb" id="nb-pos" onclick="goTo('pos')">
    <span class="ic">ð</span><span class="lb">Posiciones</span>
  </button>
  <button class="nb" id="nb-gol" onclick="goTo('gol')">
    <span class="ic">â½</span><span class="lb">Goleadores</span>
  </button>
</nav>

<script>
const SF=/san\s*fern/i;
const MESES={ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
let G=[];
const sel={fixture:'cab-a',pos:'cab-a',gol:'cab-a'};

function esHoy(f){if(!f)return false;const p=f.toLowerCase().split(/\s+/);let d=null,m=null;for(const x of p){if(/^\d{1,2}$/.test(x))d=+x;if(MESES[x]!==undefined)m=MESES[x];}if(d===null||m===null)return false;const h=new Date();return h.getDate()===d&&h.getMonth()===m;}
function hora(f){const m=(f||'').match(/\d{1,2}:\d{2}/);return m?m[0]:'';}
function sfCls(n,t){return SF.test(n)?(t==='dam'?'sfb':'sf'):'';}
function fOrd(f){const p=(f||'').toLowerCase().split(/\s+/);let d=0,m=0;for(const x of p){if(/^\d{1,2}$/.test(x))d=+x;if(MESES[x]!==undefined)m=MESES[x];}return m*31+d;}
function dKey(f){const m=(f||'').match(/\d{1,2}\s+\w+/);return m?m[0].toLowerCase():'';}
function shortN(cat){return(cat.tipo==='cab'?'Cab ':'Dam ')+cat.nombre.slice(-1);}

function goTo(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('vis'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on','on-b'));
  document.getElementById('sc-'+id).classList.add('vis');
  document.getElementById('content').scrollTo(0,0);
  const btn=document.getElementById('nb-'+id);
  btn.classList.add(id==='pos'||id==='gol'?'on-b':'on');
  if(id!=='inicio')renderSec(id);
}

function buildChips(cid,sec){
  const wrap=document.getElementById(cid);
  wrap.innerHTML='';
  let prev='';
  G.forEach(cat=>{
    if(prev&&cat.tipo!==prev)wrap.innerHTML+='<div class="cdiv"></div>';
    const on=sel[sec]===cat.id;
    const isD=cat.tipo==='dam';
    wrap.innerHTML+=`<button class="chip${on?(isD?' sd':' sc'):''}" onclick="pickCat('${cat.id}','${sec}',this)">${shortN(cat)}</button>`;
    prev=cat.tipo;
  });
}

function pickCat(id,sec,btn){
  sel[sec]=id;
  btn.closest('.chips-wrap').querySelectorAll('.chip').forEach(c=>c.classList.remove('sc','sd'));
  const cat=G.find(c=>c.id===id);
  btn.classList.add(cat?.tipo==='dam'?'sd':'sc');
  renderSec(sec);
}

function renderSec(sec){
  const cat=G.find(c=>c.id===sel[sec]);if(!cat)return;
  if(sec==='fixture')renderFix(cat);
  if(sec==='pos')renderTabla('pos-content',cat.posiciones?.headers||[],cat.posiciones?.rows,cat.tipo);
  if(sec==='gol')renderTabla('gol-content',cat.goleadores?.headers||[],cat.goleadores?.rows,cat.tipo);
}

function scoreHtml(p,cls='m-sc'){
  if(p.jugado) return `<div class="${cls}">${p.scoreLocal} - ${p.scoreVisita}</div>`;
  const h=hora(p.fecha);
  return `<div class="${cls} prox">${h||'vs'}</div>`;
}

function renderFix(cat){
  const el=document.getElementById('fix-content');
  const ps=cat.fixture||[];
  if(!ps.length){el.innerHTML='<div class="nd">Sin partidos</div>';return;}
  const jug=ps.filter(p=>p.jugado),prx=ps.filter(p=>!p.jugado);
  function grupo(lista,label){
    if(!lista.length)return'';
    const rondas={};
    lista.forEach(p=>{const r=p.ronda||'';if(!rondas[r])rondas[r]=[];rondas[r].push(p);});
    let s=`<div class="slbl">${label}</div>`;
    Object.entries(rondas).forEach(([r,ps2])=>{
      if(r)s+=`<div style="margin-bottom:5px"><span class="rnd-lbl">${r}</span></div>`;
      s+=ps2.map(p=>{
        return`<div class="m-card">
  <div class="m-teams">
    <div class="m-t r ${sfCls(p.local,cat.tipo)}">${p.local}</div>
    ${scoreHtml(p)}
    <div class="m-t ${sfCls(p.visita,cat.tipo)}">${p.visita}</div>
  </div>
  <div class="m-fecha">${p.fecha||''}</div>
</div>`;
      }).join('');
    });
    return s;
  }
  el.innerHTML=grupo(jug,'Resultados')+grupo(prx,'PrÃ³ximos');
}

function renderTabla(elId,h,rows,tipo){
  const el=document.getElementById(elId);
  if(!rows||!rows.length){el.innerHTML='<div class="nd">Sin datos</div>';return;}
  const uniq=rows.filter(r=>r.length>2&&r[2]!=='');
  const data=uniq.length?uniq:rows;
  const mask=h.map((hdr,i)=>hdr!==''||data.some(r=>r[i]!==undefined&&r[i]!==''));
  const hdrs=h.filter((_,i)=>mask[i]);
  el.innerHTML=`<div class="tw"><table><thead><tr>${hdrs.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${data.map(r=>{const hi=r.some(c=>SF.test(c))?(tipo==='dam'?'hlb':'hl'):'';const cells=r.filter((_,i)=>mask[i]);return`<tr class="${hi}">${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`;}).join('')}</tbody></table></div>`;
}

function renderInicio(){
  // partidos de hoy
  const ph=[];
  G.forEach(cat=>(cat.fixture||[]).forEach(p=>{if(esHoy(p.fecha))ph.push({,...p,catNombre:cat.nombre,catTipo:cat.tipo});}));
  const hw=document.getElementById('hoyWrap');
  if(ph.length){
    hw.innerHTML=`<div class="hoy-card"><div class="hoy-head"><h2>Partidos de Hoy</h2><span class="hoy-badge">${ph.length}</span></div>${ph.map(p=>{
      const h=hora(p.fecha);
      const sc=p.jugado?`<div class="hoy-sc">${p.scoreLocal} - ${p.scoreVisita}</div>`:`<div class="hoy-sc prox">${h||'vs'}</div>`;
      return`<div class="hoy-item"><div class="hoy-cat">${p.catNombre}</div><div class="hoy-match"><div class="hoy-t r">${p.local}</div>${sc}<div class="hoy-t">${p.visita}</div></div></div>`;
    }).join('')}</div>`;
  }else{hw.innerHTML='';}

  // Ãltima fecha por categorÃ­a
  const cards=[];
  G.forEach(cat=>{
    const jug=(cat.fixture||[]).filter(p=>p.jugado);if(!jug.length)return;
    let best=jug[0];jug.forEach(p=>{if(fOrd(p.fecha)>fOrd(best.fecha))best=p;});
    const key=dKey(best.fecha);
    cards.push({cat,matches:jug.filter(p=>dKey(p.fecha)===key),key});
  });
  document.getElementById('ufGrid').innerHTML=cards.map(({cat,matches,key})=>`<div class="uf-card"><div class="uf-head"><span class="uf-cat">${cat.nombre}</span><span class="uf-fech">${key}</span></div>${matches.map(p=>`<div class="uf-match"><div class="uf-t r ${sfCls(p.local,cat.tipo)}">${p.local}</div><div class="uf-sc">${p.scoreLocal}-${p.scoreVisita}</div><div class="uf-t ${sfCls(p.visita,cat.tipo)}">${p.visita}</div></div>`).join('')}</div>`).join('');
}

function renderAll(){
  renderInicio();
  buildChips('ch-fixture','fixture');buildChips('ch-pos','pos');buildChips('ch-gol','gol');
  renderSec('fixture');renderSec('pos');renderSec('gol');
}

async function cargarDatos(){
  const cached=localStorage.getItem('hockeyData');
  if(cached){try{const j=JSON.parse(cached);G=j.datos||[];renderAll();document.getElementById('loader').classList.add('off');if(j.actualizado){const d=new Date(j.actualizado);const l=d.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});document.getElementById('hts').textContent=l;document.getElementById('updMsg').textContent=`Actualizado ${l} Â· actualizando...`;}}catch(e){}}
  try{
    const r=await fetch('datos.json?t='+Date.now());
    const json=await r.json();
    localStorage.setItem('hockeyData',JSON.stringify(json));
    G=json.datos||[];renderAll();
    document.getElementById('loader').classList.add('off');
    if(json.actualizado){const d=new Date(json.actualizado);const l=d.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});document.getElementById('hts').textContent=l;document.getElementById('updMsg').textContent=`Actualizado ${l}`;}
  }catch(e){if(!cached){document.getElementById('updMsg').textContent='Error cargando datos';setTimeout(cargarDatos,5000);}}
}
setInterval(cargarDatos,30*60*1000);
cargarDatos();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body></html>
